<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #666;
            font-size: 1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        
        .form-group input {
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .form-group input:focus {
            border-color: #4a90d9;
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }
        
        .btn {
            background: #4a90d9;
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: background 0.2s, transform 0.1s;
        }
        
        .btn:hover {
            background: #3a7bc8;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        @media (max-width: 500px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .result-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e8eef3;
        }
        
        .result-card h3 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .result-card p {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .schedule-table th {
            background: #f8fafc;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e8eef3;
        }
        
        .schedule-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #444;
        }
        
        .schedule-table tr:hover {
            background: #f8fafc;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            gap: 16px;
        }
        
        .pagination button {
            background: white;
            color: #4a90d9;
            border: 1px solid #4a90d9;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #f0f7ff;
        }
        
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .pagination span {
            color: #666;
            font-weight: 500;
        }
        
        .message {
            padding: 16px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        
        .message.loading {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-calculator"></i> Mortgage Calculator</h1>
            <p>Calculate your monthly payments and view amortization schedule</p>
        </div>
        
        <div class="card">
            <h2 class="section-title">Loan Details</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="loanAmount">Loan Amount (£)</label>
                    <input type="number" id="loanAmount" placeholder="Enter loan amount in £" value="215000">
                </div>
                
                <div class="form-group">
                    <label for="interestRate">Annual Interest Rate (%)</label>
                    <input type="number" id="interestRate" placeholder="Enter interest rate" step="0.01" value="5.05">
                </div>
                
                <div class="form-group">
                    <label for="loanTerm">Loan Term (years)</label>
                    <input type="number" id="loanTerm" placeholder="Enter loan term" value="23">
                </div>
                
                <div class="form-group">
                    <label for="extraPayment">Monthly Extra Payment (£)</label>
                    <input type="number" id="extraPayment" placeholder="Enter extra payment amount in £" value="0">
                </div>
            </div>
            
            <button id="calculateBtn" class="btn">
                <i class="fas fa-calculator"></i> Calculate Mortgage
            </button>
            
            <div id="resultsContainer"></div>
        </div>
        
        <div class="card">
            <h2 class="section-title">Results</h2>
            <div class="results-grid">
                <div class="result-card">
                    <h3>Monthly Payment</h3>
                    <p id="monthlyPayment" class="result-value">---</p>
                </div>
                
                <div class="result-card">
                    <h3>Total Interest</h3>
                    <p id="totalInterest" class="result-value">---</p>
                </div>
                
                <div class="result-card">
                    <h3>Total Payment</h3>
                    <p id="totalPayment" class="result-value">---</p>
                </div>
                
                <div class="result-card">
                    <h3>Term Reduction</h3>
                    <p id="termReduction" class="result-value">---</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 class="section-title">Amortization Schedule</h2>
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Payment</th>
                        <th>Principal</th>
                        <th>Interest</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody id="scheduleTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #888;">Enter loan details and click calculate</td>
                    </tr>
                </tbody>
            </table>
            <div id="paginationContainer" class="pagination"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const calculateBtn = document.getElementById('calculateBtn');
            calculateBtn.addEventListener('click', calculateMortgage);
            calculateMortgage();
        });
        
        let currentPage = 1;
        const itemsPerPage = 12;
        let fullSchedule = [];
        
        async function calculateMortgage() {
            const loanAmount = parseFloat(document.getElementById('loanAmount').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value);
            const loanTerm = parseFloat(document.getElementById('loanTerm').value);
            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            
            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTerm)) {
                alert('Please enter valid numbers for all required fields');
                return;
            }
            
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '<div class="message loading"><i class="fas fa-spinner fa-spin"></i> Calculating...</div>';
            
            try {
                const baseResponse = await fetch('http://localhost:5000/api/mortgage/calculate-monthly-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        loanAmount: loanAmount,
                        annualInterestRate: interestRate,
                        loanTermYears: loanTerm
                    })
                });
                
                const baseData = await baseResponse.json();
                
                const extraResponse = await fetch('http://localhost:5000/api/mortgage/extra-payment-scenario', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        loanAmount: loanAmount,
                        annualInterestRate: interestRate,
                        loanTermYears: loanTerm,
                        extraMonthlyPayment: extraPayment
                    })
                });
                
                const extraData = await extraResponse.json();
                
                const formatGBP = (num) => num.toLocaleString('en-GB', { style: 'currency', currency: 'GBP' });
                
                document.getElementById('monthlyPayment').textContent = formatGBP(baseData);
                document.getElementById('totalInterest').textContent = formatGBP(extraData.totalInterestPaid);
                document.getElementById('totalPayment').textContent = formatGBP(loanAmount + extraData.totalInterestPaid);
                document.getElementById('termReduction').textContent = extraData.monthsSaved > 0 ? extraData.monthsSaved.toFixed(1) + ' months' : '-';
                
                updateSchedule(loanAmount, interestRate, loanTerm, extraPayment);
                
                resultsContainer.innerHTML = '<div class="message success"><i class="fas fa-check-circle"></i> Calculation completed!</div>';
                
            } catch (error) {
                console.error('Error:', error);
                resultsContainer.innerHTML = '<div class="message error"><i class="fas fa-exclamation-triangle"></i> Error calculating mortgage. Please check your inputs.</div>';
            }
        }
        
        async function updateSchedule(loanAmount, interestRate, loanTerm, extraPayment) {
            try {
                const response = await fetch('http://localhost:5000/api/mortgage/amortization-schedule-extra', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        loanAmount: loanAmount,
                        annualInterestRate: interestRate,
                        loanTermYears: loanTerm,
                        extraMonthlyPayment: extraPayment
                    })
                });
                
                fullSchedule = await response.json();
                currentPage = 1;
                renderSchedule();
                renderPagination();
                
            } catch (error) {
                console.error('Error updating schedule:', error);
            }
        }
        
        function renderSchedule() {
            const tableBody = document.getElementById('scheduleTableBody');
            tableBody.innerHTML = '';
            
            const formatGBP = (num) => num.toLocaleString('en-GB', { style: 'currency', currency: 'GBP' });
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = fullSchedule.slice(start, end);
            
            pageItems.forEach(payment => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${payment.paymentNumber}</td>
                    <td>${new Date(payment.paymentDate).toLocaleDateString()}</td>
                    <td>${formatGBP(payment.totalPayment)}</td>
                    <td>${formatGBP(payment.principalPayment)}</td>
                    <td>${formatGBP(payment.interestPayment)}</td>
                    <td>${formatGBP(payment.remainingBalance)}</td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        function renderPagination() {
            const container = document.getElementById('paginationContainer');
            const totalPages = Math.ceil(fullSchedule.length / itemsPerPage);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = `
                <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i> Prev
                </button>
                <span>${currentPage} / ${totalPages}</span>
                <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            `;
        }
        
        function changePage(delta) {
            const totalPages = Math.ceil(fullSchedule.length / itemsPerPage);
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderSchedule();
                renderPagination();
            }
        }
    </script>
</body>
</html>
